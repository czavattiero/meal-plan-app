name: Push Notifications Cron

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger push notification cron
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          TYPE="Bearer"
          curl -sf \
            -H "Authorization: ${TYPE} ${CRON_SECRET}" \
            "${APP_URL}/api/push/cron"
